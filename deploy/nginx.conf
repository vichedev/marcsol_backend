# ─────────────────────────────────────────────────────────────────────────
# nginx — reverse proxy con HTTPS (certbot/Let's Encrypt manual)
# ─────────────────────────────────────────────────────────────────────────
# Reemplaza __DOMAIN__ y __PORT__ por tus valores (o usa el instalador).
#
# Pasos típicos en Ubuntu/Debian:
#   sudo apt install -y nginx certbot python3-certbot-nginx
#   sudo cp nginx.conf /etc/nginx/sites-available/web-dinamica
#   sudo ln -s /etc/nginx/sites-available/web-dinamica /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d __DOMAIN__
# Renovación automática: certbot instala un timer systemd por sí solo.
# ─────────────────────────────────────────────────────────────────────────

# Redirección HTTP → HTTPS (certbot la deja igual al correr --nginx).
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    # ── TLS (Certbot rellena estas rutas) ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Headers de seguridad ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # ── Límite de subida (5 MB por UPLOAD_MAX_SIZE; deja margen) ───────────
    client_max_body_size 10m;

    # ── Compresión ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ── Proxy al backend NestJS ────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Logs ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/__DOMAIN__-access.log;
    error_log  /var/log/nginx/__DOMAIN__-error.log;
}
